<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style>
        .container {
            width: 80vw;
            height: 30vh;
            margin: 0;
        }

        .container>textarea {
            margin-top: 1rem;
            width: 100%;
            height: 100%;
            resize: none;
        }
    </style>
    <div class="container">
        <button id="login">Gerar acess token do usuário</button>
        <textarea id="output"></textarea>
    </div>

    <script type="module">
        // Import the functions you need from the SDKs you need
        // https://firebase.google.com/docs/web/setup#available-libraries
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBOgQ1TIBzdNcttnnicpr1d9E3zttL2ag4",
            authDomain: "larify-faribase.firebaseapp.com",
            projectId: "larify-faribase",
            storageBucket: "larify-faribase.firebasestorage.app",
            messagingSenderId: "869543189489",
            appId: "1:869543189489:web:a4489e1ed69728c4ec8250",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const email = "test@larify.com.br";
        const password = "123456";
        const setText = (text) => document.getElementById("output").textContent = text;

        const login = () => {
            setText("Fazendo login...");
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    console.log(userCredential);
                    setText(userCredential.user.accessToken);
                })
                .catch((e) => {
                    setText(`ERROR: ${e.code} - ${e.message}`);
                })
        }
        document.getElementById("login").onclick = login;
    </script>
</body>

</html>
